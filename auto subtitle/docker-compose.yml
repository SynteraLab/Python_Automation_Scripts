version: "3.9"

services:
  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SUBTITLE_REDIS_URL: redis://redis:6379/0
      SUBTITLE_CELERY_BROKER_URL: redis://redis:6379/1
      SUBTITLE_CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - shared_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    environment:
      SUBTITLE_REDIS_URL: redis://redis:6379/0
      SUBTITLE_CELERY_BROKER_URL: redis://redis:6379/1
      SUBTITLE_CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - shared_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4G

  # ── Flower (Celery monitoring — optional) ──────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      SUBTITLE_CELERY_BROKER_URL: redis://redis:6379/1
      SUBTITLE_CELERY_RESULT_BACKEND: redis://redis:6379/2
      SUBTITLE_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  shared_storage: